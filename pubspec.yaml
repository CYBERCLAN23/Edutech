name: educam_ai
description: EduCam AI - AI-powered educational platform for Cameroonian students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.2.1
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
