<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)"/>
  <!-- Brain/mind node: central hexagon -->
  <path d="M256 128L336 176V272L256 320L176 272V176L256 128Z" stroke="white" stroke-width="12" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- AI circuit lines -->
  <line x1="256" y1="320" x2="256" y2="384" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="384" x2="208" y2="416" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="384" x2="304" y2="416" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- Book pages (education) -->
  <path d="M168 200L256 248L344 200" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
