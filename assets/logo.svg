  <circle cx="208" cy="416" r="6" fill="#F59E0B"/>
  <circle cx="304" cy="416" r="6" fill="#F59E0B"/>
  <circle cx="256" cy="128" r="8" fill="#4F46E5"/>
  <!-- AI sparkle top-right -->
  <path d="M360 120L368 96L392 88L368 80L360 56L352 80L328 88L352 96L360 120Z" fill="#F59E0B" opacity="0.8"/>
  <!-- Graduate cap base -->
  <path d="M196 280L256 312L316 280" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="bgGrad" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
</svg>
